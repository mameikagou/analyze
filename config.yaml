# ==========================================
# 基金/ETF 趋势筛选器 — 配置文件
# ==========================================

# 均线参数
ma_short: 20          # 短期均线周期
ma_long: 60           # 长期均线周期
lookback_days: 150    # 拉取历史数据天数（建议 >= ma_long * 2.5）

# 输出配置
output_dir: "./output"

# 缓存配置
cache_dir: "./.cache"
cache_ttl_hours: 12   # 缓存有效期（小时）

# 数据湖配置
db_path: "./data/fund_data.db"    # SQLite 数据库路径
store_enabled: true               # 是否启用持久化数据湖（CLI 可用 --no-store 关闭）

# ---------- A股公募基金 ----------
cn_fund:
  enabled: true
  # 筛选的基金类型：股票型、混合型、指数型
  fund_types:
    - "股票型"
    - "混合型"
    - "指数型"
    - "QDII型"     # V4 新增：海外权益资产通道（QDII 债基在打分时按名称二次过滤）
  max_funds: 500      # 最多处理多少只（防止跑太久，设 0 不限制）
  annotate_purchase: true       # 是否标注申购限额信息（默认开启，仅标注不过滤）
  filter_purchase: false        # 是否过滤限额不足的基金（默认关闭，CLI 用 --purchase-filter 开启）
  purchase_min_limit: 1000      # 申购过滤阈值（元），仅 filter_purchase=true 时生效

  # 数据源路由 — 由 CompositeCNFetcher 按方法派发到不同 provider
  # akshare 为主 + tushare 补充特定字段，详见 src/fund_screener/fetchers/cn_composite.py
  data_source:
    primary: akshare                          # 未命中 route 时的兜底主源
    route:
      fetch_fund_list: akshare                # akshare 排名数据更全
      fetch_nav_history: tushare              # ← tushare 补充: 付费 SLA 规范净值
      fetch_holdings: akshare                 # akshare 独占 hold_shares 持股数
      fetch_sector_exposure: akshare          # tushare 无此接口
      fetch_fund_detail: akshare              # akshare 独占基金经理/成立日/规模/基准
      fetch_purchase_limit_map: akshare       # akshare 独占精确金额，tushare 只有二元状态

# ---------- 美股 ETF ----------
us_etf:
  enabled: true
  ticker_source: "data/us_etf_universe.json"
  # 手动追加的 ticker（配置文件里加，不用改代码）
  extra_tickers: []

# ---------- 港股 ETF ----------
hk_etf:
  enabled: true
  max_funds: 200

# ---------- 限速配置 ----------
rate_limit:
  tushare_delay_sec: 0.3     # tushare Pro 请求间隔（付费 API，限速宽松）
  akshare_delay_sec: 0.5     # akshare 请求间隔（爬东财，太快被封）
  yfinance_delay_sec: 0.3    # yfinance 请求间隔
  etfdb_delay_sec: 1.0       # etfdb 爬虫间隔（更保守）
  max_retries: 3              # 最大重试次数
  retry_backoff_sec: 2.0      # 重试退避基数（指数退避）

# ---------- V4: 量化打分配置 ----------
scoring:
  enabled: true
  top_n: 30                   # 输出 Top N 排名
  min_nav_days: 60            # 净值不足此天数的基金不参与打分
  weights:
    momentum: 0.4             # 趋势爆发力权重（用户决策：40%）
    drawdown: 0.3             # 最大回撤权重（用户决策：30%）
    sharpe: 0.3               # 夏普比率权重（用户决策：30%）

# ---------- V2: 异步批量抓取配置 ----------
async:
  concurrency: 10             # 最大并发数（Semaphore 控制）
  batch_size: 50              # 每批处理数量
  batch_sleep_min: 0.5        # 批次间休眠最小秒数
  batch_sleep_max: 1.5        # 批次间休眠最大秒数

# ---------- V2: 申万行业分类配置 ----------
sector:
  hard_tech:                  # 硬科技赛道
    - "电子"
    - "计算机"
    - "通信"
    - "国防军工"
    - "电力设备"
  resource:                   # 资源类赛道
    - "煤炭"
    - "石油石化"
    - "有色金属"
    - "钢铁"
    - "基础化工"
